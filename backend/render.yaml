# ============================================================
# BOLHA - CONFIGURAÇÃO DO RENDER
# Arquivo: render.yaml
# Propósito: Configuração automática do serviço no Render
# ============================================================

services:
  - type: web
    name: bolha-backend
    runtime: node
    plan: free
    buildCommand: npm install
    startCommand: npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: PORT
        value: 5000
      - key: MONGO_URI
        sync: false
      - key: JWT_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: FRONTEND_URL
        value: https://bolha-frontend.vercel.app
      - key: GOOGLE_CLIENT_ID
        sync: false
      - key: GOOGLE_CLIENT_SECRET
        sync: false
      - key: GOOGLE_CALLBACK_URL
        value: https://bolha-backend.onrender.com/api/auth/google/callback
      - key: LEAK_SCORE_THRESHOLD
        value: 12
    healthCheckPath: /health
    autoDeploy: true